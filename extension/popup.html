<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        --bg: #0d0f12;
        --surface: #161920;
        --surface2: #1e222b;
        --border: #2a2f3d;
        --accent: #ff6030;
        --accent-dim: rgba(255, 96, 48, 0.15);
        --accent-glow: rgba(255, 96, 48, 0.35);
        --green: #3ddc84;
        --yellow: #ffc107;
        --blue: #4da6ff;
        --text: #e8eaf0;
        --text-dim: #7a8099;
        --mono: 'JetBrains Mono', monospace;
        --sans: 'DM Sans', sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 100%;
        min-width: 280px;
        max-width: 480px;
        min-height: 200px;
        background: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        overflow-x: hidden;
      }

      /* HEADER */
      .header {
        padding: 14px clamp(12px, 4%, 20px) 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--surface);
        position: relative;
        overflow: hidden;
      }
      .header::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), transparent);
      }
      .logo {
        width: 32px; height: 32px;
        background: var(--accent);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 13px;
        color: white;
        flex-shrink: 0;
        box-shadow: 0 0 12px var(--accent-glow);
      }
      .header-info { flex: 1 }
      .header-title {
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.01em;
      }
      .header-sub {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        margin-top: 1px;
      }
      .platform-badge {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: 3px 7px;
        border-radius: 4px;
        text-transform: uppercase;
        background: var(--accent-dim);
        color: var(--accent);
        border: 1px solid rgba(255,96,48,0.3);
      }

      /* BODY */
      .body { padding: 14px clamp(12px, 4%, 20px); }

      /* COUNT INPUT */
      .count-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
      }
      .count-label {
        font-size: clamp(9px, 2.5vw, 11px);
        color: var(--text-dim);
        flex: 1;
        font-family: var(--mono);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .count-ctrl {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .count-btn {
        width: 22px; height: 22px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text);
        font-size: 14px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        transition: all 0.15s;
        line-height: 1;
      }
      .count-btn:hover { border-color: var(--accent); color: var(--accent); }
      .count-val {
        font-family: var(--mono);
        font-weight: 700;
        font-size: 15px;
        color: var(--accent);
        min-width: 32px;
        text-align: center;
      }

      /* SCRAPE BUTTON */
      .btn-scrape {
        width: 100%;
        padding: 11px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        font-family: var(--mono);
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.06em;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 16px rgba(255,96,48,0.3);
      }
      .btn-scrape:hover:not(:disabled) {
        background: #ff7448;
        box-shadow: 0 6px 24px rgba(255,96,48,0.45);
        transform: translateY(-1px);
      }
      .btn-scrape:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }
      .btn-scrape.loading {
        background: var(--surface2);
        border: 1px solid var(--accent);
        color: var(--accent);
        box-shadow: none;
      }

      /* PROGRESS */
      .progress-section {
        margin-top: 12px;
        display: none;
        animation: fadeIn 0.3s ease;
      }
      .progress-section.visible { display: block; }
      .progress-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
      }
      .progress-label {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
      }
      .progress-count {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--accent);
        font-weight: 600;
      }
      .progress-track {
        height: 3px;
        background: var(--surface2);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #ff9060);
        border-radius: 2px;
        transition: width 0.4s ease;
        width: 0%;
        position: relative;
      }
      .progress-fill::after {
        content: '';
        position: absolute;
        right: 0; top: 0;
        width: 20px; height: 100%;
        background: rgba(255,255,255,0.4);
        filter: blur(4px);
        animation: shimmer 1s infinite;
      }

      /* STATUS */
      .status-bar {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
      }
      .status-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--text-dim);
        flex-shrink: 0;
      }
      .status-dot.active {
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
        animation: pulse 1.2s infinite;
      }
      .status-dot.done { background: var(--green); }
      .status-dot.error { background: #ff4444; }

      /* DIVIDER */
      /* MODEL SELECTOR */
      .model-row {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 10px clamp(12px, 4%, 20px);
        border-bottom: 1px solid var(--border);
      }
      .model-label {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: .1em;
        color: var(--text-dim);
        text-transform: uppercase;
      }
      .model-toggle {
        display: flex;
        gap: 6px;
      }
      .model-btn {
        flex: 1;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface2);
        color: var(--text-dim);
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        transition: all .15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .model-btn:hover {
        border-color: var(--accent);
        color: var(--text);
      }
      .model-btn.active[data-model="phobert"] {
        background: rgba(79,70,229,0.15);
        border-color: rgba(79,70,229,0.5);
        color: #818cf8;
      }
      .model-btn.active[data-model="llama"] {
        background: rgba(16,185,129,0.15);
        border-color: rgba(16,185,129,0.5);
        color: #10b981;
      }
      .model-badge {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 10px;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        background: rgba(79,70,229,0.15);
        color: #818cf8;
        border: 1px solid rgba(79,70,229,0.4);
        margin-left: auto;
        transition: all .2s;
      }
      .model-note {
        font-size: 10px;
        color: var(--text-dim);
        font-family: var(--mono);
      }
      .model-note .llama-note { color: #10b981; }

      .divider {
        height: 1px;
        background: var(--border);
        margin: 12px 0;
        display: none;
      }
      .divider.visible { display: block; }

      /* RESULTS */
      .results-section { display: none; }
      .results-section.visible { display: block; animation: fadeIn 0.3s ease; }

      .results-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .results-title {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .results-stats {
        display: flex;
        gap: 8px;
      }
      .stat-chip {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 4px;
        letter-spacing: 0.05em;
      }
      .stat-total {
        background: rgba(77,166,255,0.15);
        color: var(--blue);
        border: 1px solid rgba(77,166,255,0.25);
      }

      /* REVIEW LIST */
      .review-list {
        max-height: clamp(180px, 40vh, 320px);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-right: 2px;
      }
      .review-list::-webkit-scrollbar { width: 3px; }
      .review-list::-webkit-scrollbar-track { background: transparent; }
      .review-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

      .review-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 9px 11px;
        animation: slideUp 0.25s ease both;
        transition: border-color 0.15s;
      }
      .review-card:hover { border-color: var(--accent); }

      .review-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 5px;
      }
      .review-idx {
        font-family: var(--mono);
        font-size: 9px;
        color: var(--text-dim);
      }
      .sentiment-badge {
        font-family: var(--mono);
        font-size: 8px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 3px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .sentiment-null {
        background: rgba(122,128,153,0.15);
        color: var(--text-dim);
        border: 1px solid rgba(122,128,153,0.2);
      }
      .sentiment-pos {
        background: rgba(61,220,132,0.15);
        color: var(--green);
        border: 1px solid rgba(61,220,132,0.25);
      }
      .sentiment-neg {
        background: rgba(255,68,68,0.15);
        color: #ff6666;
        border: 1px solid rgba(255,68,68,0.25);
      }
      .sentiment-neu {
        background: rgba(255,193,7,0.15);
        color: var(--yellow);
        border: 1px solid rgba(255,193,7,0.25);
      }

      .review-text {
        font-size: 11px;
        line-height: 1.5;
        color: var(--text);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      /* ACTION ROW */
      .action-row {
        display: flex;
        gap: 6px;
        margin-top: 10px;
      }
      .btn-sm {
        flex: 1;
        padding: 8px;
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.05em;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.15s;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-dim);
      }
      .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
      .btn-copy { color: var(--blue); border-color: rgba(77,166,255,0.3); background: rgba(77,166,255,0.08); }
      .btn-copy:hover { border-color: var(--blue); background: rgba(77,166,255,0.15); }
      .btn-clear:hover { border-color: #ff4444; color: #ff6666; }

      /* ANIMATIONS */
      @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(6px) }
        to   { opacity: 1; transform: translateY(0) }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1) }
        50% { opacity: 0.5; transform: scale(0.8) }
      }
      @keyframes shimmer {
        0% { opacity: 0 }
        50% { opacity: 1 }
        100% { opacity: 0 }
      }
      @keyframes spin {
        to { transform: rotate(360deg) }
      }
      .spinner {
        display: inline-block;
        width: 10px; height: 10px;
        border: 2px solid rgba(255,96,48,0.3);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <div class="logo">AB</div>
      <div class="header-info">
        <div class="header-title">ABSA Reviewer</div>
        <div class="header-sub">Aspect-Based Sentiment Analysis</div>
      </div>
      <div class="platform-badge" id="platformBadge">Shopee</div>
    </div>

    <!-- BODY -->
    <div class="body">

      <!-- COUNT INPUT -->
      <div class="count-row">
        <span class="count-label">SỐ REVIEW CẦN CÀO</span>
        <div class="count-ctrl">
          <button class="count-btn" id="btnMinus">−</button>
          <span class="count-val" id="countVal">50</span>
          <button class="count-btn" id="btnPlus">+</button>
        </div>
      </div>

      <!-- MODEL SELECTOR -->
      <div class="model-row">
        <div style="display:flex;align-items:center;">
          <span class="model-label">MÔ HÌNH PHÂN TÍCH</span>
          <span class="model-badge" id="modelBadge">PhoBERT</span>
        </div>
        <div class="model-toggle">
          <button class="model-btn active" data-model="phobert">
            🤖 PhoBERT
          </button>
          <button class="model-btn" data-model="llama">
            🦙 LLaMA 3.2
          </button>
        </div>
        <span class="model-note">
          PhoBERT: local · nhanh · có confidence
          &nbsp;|&nbsp;
          <span class="llama-note">LLaMA: HF API · chậm hơn</span>
        </span>
      </div>

      <!-- SCRAPE BUTTON -->
      <button class="btn-scrape" id="btnScrape">▶ Bắt đầu cào</button>

      <!-- STATUS BAR -->
      <div class="status-bar">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Sẵn sàng</span>
      </div>

      <!-- PROGRESS -->
      <div class="progress-section" id="progressSection">
        <div class="progress-header">
          <span class="progress-label">TIẾN ĐỘ</span>
          <span class="progress-count" id="progressCount">0 / 0</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- DIVIDER -->
      <div class="divider" id="divider"></div>

      <!-- RESULTS -->
      <div class="results-section" id="resultsSection">
        <div class="results-header">
          <span class="results-title">KẾT QUẢ</span>
          <div class="results-stats">
            <span class="stat-chip stat-total" id="statTotal">0 reviews</span>
          </div>
        </div>

        <div class="review-list" id="reviewList"></div>

        <div class="action-row">
          <button class="btn-sm btn-copy" id="btnCopy">⬇ Export JSON</button>
          <button class="btn-sm btn-clear" id="btnClear">✕ Xóa</button>
        </div>
      </div>

    </div>

    <script src="popup.js"></script>
  </body>
</html>
